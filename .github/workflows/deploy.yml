name: Deploy

# Manual, environment-gated deploy. Builds + pushes the backend/frontend images
# to Artifact Registry, then runs `terraform apply` to roll them out to Cloud
# Run. Authentication is keyless via Workload Identity Federation (see
# terraform-mvp/iam.tf) — no service-account JSON keys.
#
# Required GitHub *variables* (Settings → Secrets and variables → Actions →
# Variables), typically per Environment:
#   GCP_PROJECT_ID     e.g. machote-prod
#   GCP_REGION         e.g. us-central1
#   WIF_PROVIDER       projects/<n>/locations/global/workloadIdentityPools/<pool>/providers/github-oidc
#   DEPLOYER_SA        machote-<env>-deployer@<project>.iam.gserviceaccount.com
#   TF_STATE_BUCKET    machote-<env>-tfstate

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        options: [test, staging, prod]
        required: true

permissions:
  contents: read
  id-token: write # required for WIF

concurrency:
  group: deploy-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & deploy (${{ github.event.inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    env:
      ENV: ${{ github.event.inputs.environment }}
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      REGION: ${{ vars.GCP_REGION }}
      REPO: machote-docker
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOYER_SA }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Compute image tags
        id: img
        run: |
          BASE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO}"
          SHA="${GITHUB_SHA::12}"
          echo "backend=${BASE}/backend:${SHA}"   >> "$GITHUB_OUTPUT"
          echo "frontend=${BASE}/frontend:${SHA}" >> "$GITHUB_OUTPUT"

      - name: Build & push backend
        run: |
          docker build -f backend/Dockerfile -t "${{ steps.img.outputs.backend }}" .
          docker push "${{ steps.img.outputs.backend }}"

      - name: Sync config (generate frontend .env.production)
        run: |
          # CI must provide a root .env (from secrets) before syncing; the
          # frontend image bakes VITE_* at build time.
          scripts/sync-config.sh

      - name: Build & push frontend
        run: |
          docker build -f frontend/Dockerfile -t "${{ steps.img.outputs.frontend }}" ./frontend
          docker push "${{ steps.img.outputs.frontend }}"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Terraform init
        working-directory: terraform-mvp
        run: terraform init -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" -backend-config="prefix=machote/${ENV}"

      - name: Terraform apply
        working-directory: terraform-mvp
        run: |
          terraform apply -auto-approve \
            -var-file="environments/${ENV}.tfvars" \
            -var="backend_image=${{ steps.img.outputs.backend }}" \
            -var="frontend_image=${{ steps.img.outputs.frontend }}"
