name: Terraform

on:
  pull_request:
    branches: [main]
    paths:
      - "terraform-mvp/**"
  push:
    branches: [main]
    paths:
      - "terraform-mvp/**"

permissions:
  contents: read

jobs:
  validate:
    name: fmt · validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform-mvp
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Format check
        run: terraform fmt -check -recursive

      - name: Init (no backend — validation only)
        run: terraform init -backend=false

      - name: Validate
        run: terraform validate
