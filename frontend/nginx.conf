# Hardened nginx server for the SPA. Runs under nginx-unprivileged on :8080.
server {
    listen       8080;
    listen       [::]:8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ---- Security headers ------------------------------------------------
    # HSTS is terminated at the load balancer / Cloud Run edge; set it there.
    add_header X-Content-Type-Options    "nosniff"            always;
    add_header X-Frame-Options           "DENY"               always;
    add_header Referrer-Policy           "no-referrer"        always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin"       always;
    add_header Cross-Origin-Resource-Policy "same-origin"     always;

    # Content-Security-Policy in report-only mode first: tighten, observe, then
    # promote to enforcing (rename header to Content-Security-Policy).
    # Firebase Auth needs connect/frame to its endpoints; adjust per project.
    add_header Content-Security-Policy-Report-Only "\
default-src 'self'; \
base-uri 'self'; \
object-src 'none'; \
frame-ancestors 'none'; \
img-src 'self' data: https:; \
font-src 'self' data:; \
style-src 'self' 'unsafe-inline'; \
script-src 'self'; \
connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://securetoken.googleapis.com https://identitytoolkit.googleapis.com; \
frame-src 'self' https://*.firebaseapp.com https://*.web.app; \
" always;

    # ---- Health check (no logging noise) ---------------------------------
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # ---- Static assets: long cache, content-hashed filenames -------------
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ---- API proxy (compose/local dev; in prod the LB routes /api) -------
    # Resolve the upstream at request time via a variable so nginx still boots
    # when `backend` is unresolvable (e.g. Cloud Run, where the load balancer
    # routes /api directly). Unresolvable host -> 502 at request time, not a
    # startup crash. 127.0.0.11 is Docker's embedded DNS (user-defined networks).
    location /api/ {
        resolver           127.0.0.11 valid=30s ipv6=off;
        set                $api_upstream backend;
        proxy_pass         http://$api_upstream:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ---- SPA fallback: everything else serves index.html -----------------
    location / {
        try_files $uri $uri/ /index.html;
        # HTML must not be cached so new deploys are picked up immediately.
        add_header Cache-Control "no-cache";
    }

    # Do not leak the nginx version.
    server_tokens off;

    # Reasonable body size cap for a frontend origin.
    client_max_body_size 2m;

    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_types        text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
}
