[pytest]
testpaths = tests
asyncio_mode = auto
addopts =
    --strict-markers
    --strict-config
    -ra
filterwarnings =
    error
    # Allow-list (documented): third-party deprecations we do not control.
    ignore::DeprecationWarning:google.*
    ignore::DeprecationWarning:pydantic.*
    default::ResourceWarning
markers =
    integration: tests that require a real PostgreSQL (and optionally Neo4j).
    entrypoint: tests for the container entrypoint contract.
